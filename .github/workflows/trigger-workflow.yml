name: Trigger Target Workflow

on:
  workflow_dispatch:
  push:
    branch: ["main"]

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Website Update
        run: |
          repo_owner="Ewwii-sh"
          repo_name="ewwii-sh.github.io"
          event_type="trigger-workflow"

          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/$repo_owner/$repo_name/actions/workflows/gh-pages.yml/dispatches \
            -d '{
              "ref": "main"
            }'
